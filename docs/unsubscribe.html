<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unsubscribe — BKRLab Space Weather Alerts</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0b1220;
      color: #c8d6e8;
      line-height: 1.6;
    }
    header {
      background: #111a2b;
      border-bottom: 1px solid #1e2d45;
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    header h1 { color: #45c4ff; font-size: 1.4rem; }
    header a { color: #6a8fb0; font-size: .9rem; text-decoration: none; }
    main { max-width: 500px; margin: 3rem auto; padding: 0 2rem; }
    h2 { color: #45c4ff; margin-bottom: 1rem; }
    p { margin-bottom: 1rem; color: #8ba8c8; }
    .card {
      background: #111a2b;
      border: 1px solid #1e2d45;
      border-radius: 8px;
      padding: 2rem;
    }
    label { display: block; margin-bottom: .4rem; font-size: .9rem; color: #8ba8c8; }
    input[type="tel"] {
      width: 100%;
      padding: .7rem 1rem;
      background: #0b1220;
      border: 1px solid #2a3d55;
      border-radius: 6px;
      color: #c8d6e8;
      font-size: 1.1rem;
      margin-bottom: 1.25rem;
    }
    input[type="tel"]:focus {
      outline: none;
      border-color: #45c4ff;
    }
    button {
      width: 100%;
      padding: .8rem;
      background: #1a3a5a;
      border: 1px solid #45c4ff55;
      border-radius: 6px;
      color: #45c4ff;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover { background: #0d2340; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .status {
      margin-top: 1rem;
      padding: .75rem 1rem;
      border-radius: 6px;
      display: none;
      font-size: .95rem;
    }
    .status.success { background: #1a3a2a; border: 1px solid #2a5a3a; color: #7bff9b; display: block; }
    .status.error   { background: #3a1a1a; border: 1px solid #5a2a2a; color: #ff7b7b; display: block; }
    .alt-method {
      margin-top: 1.5rem;
      text-align: center;
      font-size: .9rem;
      color: #4a6080;
    }
    .alt-method strong { color: #8ba8c8; }
    footer {
      text-align: center;
      padding: 2rem;
      color: #4a6080;
      font-size: .85rem;
    }
    footer a { color: #6a8fb0; }
  </style>
</head>
<body>

<header>
  <span>🌌</span>
  <div>
    <h1>Unsubscribe</h1>
    <a href="index.html">← Back to BKRLab Space Weather Alerts</a>
  </div>
</header>

<main>
  <div class="card">
    <h2>Remove your number</h2>
    <p>Enter the phone number you want to unsubscribe. We'll send you a one-time confirmation text to complete the removal.</p>

    <form id="unsub-form">
      <label for="phone">Mobile phone number</label>
      <input type="tel" id="phone" name="phone"
             placeholder="+1 (555) 000-0000"
             autocomplete="tel" required>
      <button type="submit" id="submit-btn">Send unsubscribe request</button>
    </form>

    <div class="status" id="status-msg"></div>

    <div class="alt-method">
      Or text <strong>STOP</strong> to <strong>+1 (978) 483-0684</strong> directly.
    </div>
  </div>
</main>

<footer>
  <a href="index.html">Home</a> · <a href="privacy.html">Privacy Policy</a>
</footer>

<script>
  const ENDPOINT = 'https://space-weather-alerts-1699-dev.twil.io/unsubscribe';

  document.getElementById('unsub-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const status = document.getElementById('status-msg');
    const phone = document.getElementById('phone').value.trim();

    btn.disabled = true;
    btn.textContent = 'Sending…';
    status.className = 'status';
    status.textContent = '';

    try {
      const resp = await fetch(ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone })
      });
      const data = await resp.json();
      if (resp.ok && data.ok) {
        status.className = 'status success';
        status.textContent = 'Done — check your phone for a confirmation text, then reply STOP to complete the unsubscribe.';
        document.getElementById('phone').value = '';
      } else {
        throw new Error(data.error || 'Request failed');
      }
    } catch (err) {
      status.className = 'status error';
      status.textContent = 'Something went wrong. Text STOP to +1 (978) 483-0684 to unsubscribe directly.';
    }

    btn.disabled = false;
    btn.textContent = 'Send unsubscribe request';
  });
</script>
</body>
</html>
